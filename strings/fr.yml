fr:
  number:
    format:
      delimiter: " "
  date:
    month_names:
    - 
    - janvier
    - février
    - mars
    - avril
    - mai
    - juin
    - juillet
    - août
    - septembre
    - octobre
    - novembre
    - décembre
  last_readings:
    readings_count_in_year:
      zero: "Aucun livre lu en %{year}"
      one: "Voir le livre lu en %{year}"
      other: "Voir les %{book_count} livres lus en %{year}"
    readings_count_in_month:
      zero: "Aucun livre lu en %{month} %{year}"
      one: "Voir le livre lu en %{month} %{year}"
      other: "Voir les %{book_count} livres lus en %{month} %{year}"
    books_count:
      zero: "%{count} livre"
      one: "%{count} livre"
      other: "%{count} livres"
    pages_count:
      zero: "%{formatted_count} page"
      one: "%{formatted_count} page"
      other: "%{formatted_count} pages"